name: 美股热点扫描

on:
  schedule:
    # 美股交易时间 美东 9:30-16:00（周一至周五）
    # 开盘15分钟后开始，每小时扫描一次
    # 夏令时(3月-11月) ET=UTC-4，冬令时(11月-3月) ET=UTC-5
    # 
    # 夏令时映射:
    - cron: '45 13 * * 1-5'   # 美东 9:45  → 首次扫描
    - cron: '45 14 * * 1-5'   # 美东 10:45
    - cron: '45 15 * * 1-5'   # 美东 11:45
    - cron: '45 16 * * 1-5'   # 美东 12:45
    - cron: '45 17 * * 1-5'   # 美东 13:45
    - cron: '45 18 * * 1-5'   # 美东 14:45
    - cron: '45 19 * * 1-5'   # 美东 15:45 → 末次扫描（收盘前15分钟）
    # 
    # 冬令时映射 (届时替换上方cron):
    # - cron: '45 14 * * 1-5'   # 美东 9:45
    # - cron: '45 15 * * 1-5'   # 美东 10:45
    # - cron: '45 16 * * 1-5'   # 美东 11:45
    # - cron: '45 17 * * 1-5'   # 美东 12:45
    # - cron: '45 18 * * 1-5'   # 美东 13:45
    # - cron: '45 19 * * 1-5'   # 美东 14:45
    # - cron: '45 20 * * 1-5'   # 美东 15:45
  workflow_dispatch:  # 手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scanner
        run: python main.py
